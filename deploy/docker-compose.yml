# Base compose — shared service definition.
# Overlays (pick one):
#   dev:  docker-compose.dev.yml   (bind-mount app, uvicorn --reload)
#   prod: docker-compose.prod.yml (image-bundled app, no reload)
#
# Quick start:
#   ./scripts/compose_up.sh              # dev (default)
#   COMPOSE_MODE=prod ./scripts/compose_up.sh
#
# GPU/CPU runtime overlays: docker-compose.gpu.yml | docker-compose.cpu.yml
#
# Paths in .env use ./models, ./data — resolved from WORKDIR /service in the container.

services:
  face-api:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    working_dir: /service
    build:
      context: .
      dockerfile: Dockerfile
      args:
        RUNTIME: ${RUNTIME:-gpu}
        TARGETPLATFORM: ${DOCKER_PLATFORM:-linux/amd64}
    image: facerecog-access-control:${RUNTIME:-gpu}
    ports:
      - "${PORT:-8123}:${PORT:-8123}"
    env_file:
      - .env
    volumes:
      - ./models:/service/models:ro
      - ./data:/service/data
    restart: unless-stopped
