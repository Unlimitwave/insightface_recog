# GPU overlay (requires nvidia-container-toolkit on host)
# Usage: RUNTIME=gpu docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d --build

services:
  face-api:
    build:
      args:
        RUNTIME: gpu
        BASE_IMAGE: nvidia/cuda:12.4.1-runtime-ubuntu22.04
    image: facerecog-access-control:gpu
    environment:
      - DEVICE=${DEVICE:-auto}
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
