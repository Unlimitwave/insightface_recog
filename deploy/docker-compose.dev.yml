# Development overlay: hot-reload via bind-mounted app source.
# Usage: ./scripts/compose_up.sh  (default COMPOSE_MODE=dev)

services:
  face-api:
    environment:
      ENVIRONMENT: development
    volumes:
      - ./app:/service/app
    command:
      [
        "python3",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "${PORT:-8123}",
        "--reload",
        "--reload-dir",
        "/service/app",
      ]
